# .github/workflows/auto-rerun.yml
#
# Automatically re-runs failed jobs (up to 3 total attempts) for all CI
# workflows. Handles transient failures from GH Actions infrastructure,
# network issues, or flaky external services (SRA, PyPI, etc.).

name: Auto-rerun Failed Jobs

on:
  workflow_run:
    workflows: ["Tests", "Compatibility Tests", "Linting and Formatting"]
    types: [completed]

jobs:
  rerun-on-failure:
    if: >-
      github.event.workflow_run.conclusion == 'failure'
      && github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    steps:
      - name: Rerun failed jobs
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            console.log(`Workflow: ${run.name}`);
            console.log(`Run ID: ${run.id}`);
            console.log(`Attempt: ${run.run_attempt} → ${run.run_attempt + 1}`);
            console.log(`Trigger: ${run.event}`);
            console.log(`Branch: ${run.head_branch}`);
            console.log(`Commit: ${run.head_sha.substring(0, 7)}`);

            await github.rest.actions.reRunWorkflowFailedJobs({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
            });

            console.log(`Re-run triggered for failed jobs`);
