# .github/workflows/compatibility-tests.yml
#
# Container runtime tests for Singularity and Apptainer on GH runners.
# Runs on PRs to main and weekly schedule. Verifies the workflow works with
# both stable and latest versions of container runtimes and Snakemake,
# catching upstream regressions early.

name: Compatibility Tests

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - "CITATION.cff"
      - "CITATIONS.md"
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Resolve_Versions:
    name: Resolve latest container versions
    runs-on: ubuntu-latest
    outputs:
      apptainer_latest: ${{ steps.apptainer.outputs.version }}
    steps:
      - name: Get latest Apptainer release
        id: apptainer
        run: |
          VERSION=$(curl -s https://api.github.com/repos/apptainer/apptainer/releases/latest \
            | jq -r '.tag_name' | sed 's/^v//')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Latest Apptainer: ${VERSION}"

  SDM_Singularity_Conda:
    name: ${{ matrix.scenario.name }} (Snakemake ${{ matrix.version.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        scenario:
          # SRA Reads - Yeast (no subsampling, stops after SRA download)
          - name: SRA_Yeast_Singularity
            rules: aggregate_sra_pe_reads
            configfile: .test/sra_reads/config_yeast/config.yaml
            extra_args: ""
            cleanup: true
          # SRA Reads - Mouse (subsampled, full workflow)
          - name: SRA_Mouse_Subsampled_Singularity
            rules: all
            configfile: .test/sra_reads/config_mouse/config.yaml
            extra_args: ""
            cleanup: true
          # Local Reads - Ensembl (complex config)
          - name: LR_Ens_Comp_Singularity
            rules: all
            configfile: .test/local_reads/ensembl/config_complex/config.yaml
            extra_args: ""
            cleanup: true
          # Local Reads - Ensembl (GMT test config)
          - name: LR_Ens_GMT_Singularity
            rules: all
            configfile: .test/local_reads/ensembl/config_gmt_test/config.yaml
            extra_args: ""
            cleanup: true
          # Local Reads - RefSeq (complex config)
          - name: LR_Ref_Comp_Singularity
            rules: all
            configfile: .test/local_reads/refseq/config_complex/config.yaml
            extra_args: ""
            cleanup: true
        version:
          - name: stable
            snakemake: 8.27.1
            singularity: 3.8.4
            allow_failure: false
          - name: latest
            snakemake: "*"
            singularity: 3.8.4
            allow_failure: false
    steps:
      - name: update apt
        run: sudo apt-get update
      - name: Free Disk Space (Ubuntu)
        if: ${{ matrix.scenario.cleanup }}
        uses: jlumbroso/free-disk-space@v1.3.0
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: false

          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Remove .Rprofile to avoid renv auto-activation
        run: rm -rf .Rprofile renv renv.lock
      - name: Create host directory for R config (Singularity)
        run: mkdir -p ${{ github.workspace }}/.host_R_config_singularity
      - name: Install Singularity
        uses: singularityhub/install-singularity@main
        with:
          singularity-version: ${{ matrix.version.singularity }}
      - name: Run Snakemake workflow (Singularity)
        uses: snakemake/snakemake-github-action@v2
        continue-on-error: ${{ matrix.version.allow_failure }}
        with:
          directory: .
          snakefile: workflow/Snakefile
          # Usage of --bind required for success of rule make_linked_txome
          # on GitHub runners
          args: >
            ${{ matrix.scenario.rules }} --workflow-profile profiles/github-actions-singularity
            --use-singularity
            --singularity-args "--bind ${{ github.workspace }}/.host_R_config_singularity:/home/runner/.config/R"
            --configfile ${{ matrix.scenario.configfile }}
            --config api_keys='{"ncbi": "${{ secrets.BB_NCBI_API_KEY }}"}'
            ${{ matrix.scenario.extra_args }}
          show-disk-usage-on-error: true
          snakemake-version: ${{ matrix.version.snakemake }}
      - name: Upload ./logs/
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.scenario.name }}-smk_${{ matrix.version.name }}-logs
          path: logs/

  SDM_Apptainer_Conda:
    name: ${{ matrix.scenario.name }} (Snakemake ${{ matrix.version.name }})
    runs-on: ubuntu-latest
    needs: [Resolve_Versions]
    strategy:
      fail-fast: true
      matrix:
        scenario:
          # SRA Reads - Yeast (no subsampling, stops after SRA download)
          - name: SRA_Yeast_Apptainer
            rules: aggregate_sra_pe_reads
            configfile: .test/sra_reads/config_yeast/config.yaml
            extra_args: ""
            cleanup: true
          # SRA Reads - Mouse (subsampled, full workflow)
          - name: SRA_Mouse_Subsampled_Apptainer
            rules: all
            configfile: .test/sra_reads/config_mouse/config.yaml
            extra_args: ""
            cleanup: true
          # Local Reads - Ensembl (complex config)
          - name: LR_Ens_Comp_Apptainer
            rules: all
            configfile: .test/local_reads/ensembl/config_complex/config.yaml
            extra_args: ""
            cleanup: true
          # Local Reads - Ensembl (GMT test config)
          - name: LR_Ens_GMT_Apptainer
            rules: all
            configfile: .test/local_reads/ensembl/config_gmt_test/config.yaml
            extra_args: ""
            cleanup: true
          # Local Reads - RefSeq (complex config)
          - name: LR_Ref_Comp_Apptainer
            rules: all
            configfile: .test/local_reads/refseq/config_complex/config.yaml
            extra_args: ""
            cleanup: true
        version:
          - name: stable
            snakemake: 8.27.1
            # Pinned version for stable baseline
            apptainer: 1.4.1
            allow_failure: false
          - name: latest
            snakemake: "*"
            # Placeholder — resolved dynamically by Resolve_Versions job
            apptainer: latest
            allow_failure: false
    steps:
      - name: update apt
        run: sudo apt-get update
      - name: Free Disk Space (Ubuntu)
        if: ${{ matrix.scenario.cleanup }}
        uses: jlumbroso/free-disk-space@v1.3.0
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: false

          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Remove .Rprofile to avoid renv auto-activation
        run: rm -rf .Rprofile renv renv.lock
      - name: Create host directory for R config (Apptainer)
        run: mkdir -p ${{ github.workspace }}/.host_R_config_apptainer
      - name: Resolve Apptainer version
        id: apptainer_ver
        run: |
          VERSION="${{ matrix.version.apptainer }}"
          if [ "$VERSION" = "latest" ]; then
            VERSION="${{ needs.Resolve_Versions.outputs.apptainer_latest }}"
            echo "Resolved latest Apptainer to: ${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Install Apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: ${{ steps.apptainer_ver.outputs.version }}
      - name: Run Snakemake workflow (Apptainer)
        uses: snakemake/snakemake-github-action@v2
        continue-on-error: ${{ matrix.version.allow_failure }}
        with:
          directory: .
          snakefile: workflow/Snakefile
          # Usage of --bind required for success of rule make_linked_txome
          # on GitHub runners
          args: >
            ${{ matrix.scenario.rules }} --workflow-profile profiles/github-actions-singularity
            --use-singularity
            --singularity-args "--bind ${{ github.workspace }}/.host_R_config_apptainer:/home/runner/.config/R"
            --configfile ${{ matrix.scenario.configfile }}
            --config api_keys='{"ncbi": "${{ secrets.BB_NCBI_API_KEY }}"}'
            ${{ matrix.scenario.extra_args }}
          show-disk-usage-on-error: true
          snakemake-version: ${{ matrix.version.snakemake }}
      - name: Upload ./logs/
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.scenario.name }}-smk_${{ matrix.version.name }}-logs
          path: logs/
