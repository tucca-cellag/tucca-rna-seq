# .github/workflows/hpc-tests.yml
#
# Runs Singularity + Apptainer integration tests on the Tufts HPC cluster
# via SSH + SLURM. Each run:
#   1. SSHs to the login node (light operations only)
#   2. Clones the repo into a temp directory on lab storage
#   3. Submits a SLURM batch job that runs the Snakemake orchestrator
#   4. The Snakemake orchestrator (via slurm-dev profile) submits
#      individual rule jobs as SLURM sub-jobs
#   5. Polls the wrapper job until completion
#   6. Retrieves logs and cleans up
#
# Smoke tests (SSH_Connectivity → SLURM_Smoke_Test) run first to validate
# infrastructure before committing to full Snakemake runs.

name: HPC Tests

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Test scenario to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - SRA_Yeast
          - SRA_Mouse
          - LR_Ens_Comp
          - LR_Ens_GMT
          - LR_Ref_Comp
      container:
        description: "Container runtime to test"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - singularity
          - apptainer
  # TODO: Enable these triggers after manual testing confirms SSH + SLURM works
  # TEMPORARY: push trigger for testing in PR #23 — remove before merge
  push:
    branches: [feat/hpc-ci]
  # push:
  #   branches: [main, feat/*]
  #   paths-ignore:
  #     - "**.md"
  #     - "docs/**"
  #     - "LICENSE"
  #     - "CITATION.cff"
  #     - "CITATIONS.md"
  # pull_request:
  #   branches-ignore: []
  #   paths-ignore:
  #     - "**.md"
  #     - "docs/**"
  #     - "LICENSE"
  #     - "CITATION.cff"
  #     - "CITATIONS.md"
  # schedule:
  #   - cron: "0 0 * * 1"

concurrency:
  group: hpc-tests-${{ github.ref }}
  cancel-in-progress: false # don't orphan running SLURM jobs

env:
  SSH_HOST: login-prod-01.pax.tufts.edu
  # HPC module versions
  SNAKEMAKE_MODULE: snakemake/8.27.1
  SINGULARITY_MODULE: singularity/3.8.4
  APPTAINER_MODULE: apptainer/1.2.5-no-suid
  CONDA_MODULE: miniforge/25.3.0-3
  # SLURM wrapper job resources (for the Snakemake orchestrator process)
  # Keep lightweight — Snakemake submits actual compute as sub-jobs
  SBATCH_PARTITION: batch
  SBATCH_TIME: "3-00:00:00"
  SBATCH_MEM: "16G"
  SBATCH_CPUS: "1"

jobs:
  # ─── Smoke Tests ───────────────────────────────────────────────────────
  SSH_Connectivity:
    name: SSH Connectivity Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TUFTS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Test SSH connection
        run: |
          echo "Testing SSH to ${{ env.SSH_HOST }}..."
          ssh ${{ secrets.TUFTS_SSH_USER }}@${{ env.SSH_HOST }} bash <<'REMOTE_SCRIPT'
            set -euo pipefail
            echo "=== SSH Connectivity Test ==="
            echo "Host: $(hostname)"
            echo "User: $(whoami)"
            echo "Home: $HOME"
            echo "Work dir exists: $(test -d '${{ secrets.TUFTS_WORK_DIR }}' && echo 'yes' || echo 'NO — create it!')"
            echo "=== Modules available ==="
            module avail ${{ env.SNAKEMAKE_MODULE }} 2>&1 | head -5 || echo "Module system unavailable"
            echo "=== SSH OK ==="
          REMOTE_SCRIPT

  SLURM_Smoke_Test:
    name: SLURM Smoke Test
    runs-on: ubuntu-latest
    needs: [SSH_Connectivity]
    timeout-minutes: 15
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TUFTS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Submit trivial SLURM job
        id: slurm
        run: |
          JOB_ID=$(ssh ${{ secrets.TUFTS_SSH_USER }}@${{ env.SSH_HOST }} bash <<'REMOTE_SCRIPT'
            set -euo pipefail

            # Write a trivial batch script
            SMOKE_DIR="${HOME}/.tucca-ci-smoke-$$"
            mkdir -p "${SMOKE_DIR}"
            cat > "${SMOKE_DIR}/smoke.sh" <<'BATCH_SCRIPT'
          #!/bin/bash -l
          #SBATCH -J tucca-ci-smoke
          #SBATCH --time=00:05:00
          #SBATCH -p ${{ env.SBATCH_PARTITION }}
          #SBATCH -N 1
          #SBATCH -n 1
          #SBATCH --mem=1G
          #SBATCH --output=${{ secrets.TUFTS_WORK_DIR }}/smoke-%j.out
          #SBATCH --error=${{ secrets.TUFTS_WORK_DIR }}/smoke-%j.err

          echo "=== SLURM Smoke Test ==="
          echo "Node: $(hostname)"
          echo "Job ID: ${SLURM_JOB_ID}"
          echo "Partition: ${SLURM_JOB_PARTITION}"
          echo "User: $(whoami)"
          squeue -u $(whoami) --format="%.10i %.20j %.8T %.10M" || true
          echo "=== SLURM Smoke Test OK ==="
          BATCH_SCRIPT

            chmod +x "${SMOKE_DIR}/smoke.sh"
            RESULT=$(sbatch "${SMOKE_DIR}/smoke.sh")
            echo "${RESULT}" | grep -oP '\d+' | tail -1
          REMOTE_SCRIPT
          )

          echo "job_id=${JOB_ID}" >> "$GITHUB_OUTPUT"
          echo "Submitted SLURM smoke test job: ${JOB_ID}"

      - name: Wait for SLURM job to complete
        run: |
          JOB_ID="${{ steps.slurm.outputs.job_id }}"
          echo "Waiting for SLURM smoke test job ${JOB_ID}..."

          # Allow SLURM to register the job before polling
          sleep 30

          while true; do
            STATE=$(ssh ${{ secrets.TUFTS_SSH_USER }}@${{ env.SSH_HOST }} \
              "sacct -j ${JOB_ID} --format=State --noheader --parsable2 | head -1 | tr -d ' '")

            echo "$(date '+%H:%M:%S') Job ${JOB_ID}: ${STATE:-'(not yet registered)'}"

            case "${STATE}" in
              COMPLETED)
                echo "Smoke test completed successfully"
                break
                ;;
              FAILED|CANCELLED|TIMEOUT|OUT_OF_MEMORY|NODE_FAIL|PREEMPTED)
                echo "::error::SLURM smoke test job ${JOB_ID} ended with state: ${STATE}"
                exit 1
                ;;
              PENDING|RUNNING|CONFIGURING|COMPLETING|REQUEUED|"")
                sleep 15
                ;;
              *)
                echo "Unknown state: ${STATE}, continuing to wait..."
                sleep 15
                ;;
            esac
          done

      - name: Cleanup
        if: always()
        run: |
          ssh ${{ secrets.TUFTS_SSH_USER }}@${{ env.SSH_HOST }} \
            "rm -rf ${HOME}/.tucca-ci-smoke-*" || true

  # ─── Full Integration Tests ────────────────────────────────────────────
  HPC_Singularity:
    name: ${{ matrix.scenario.name }}_Singularity (HPC)
    runs-on: ubuntu-latest
    needs: [SLURM_Smoke_Test]
    if: >-
      github.event_name != 'workflow_dispatch' || inputs.container == 'both' || inputs.container == 'singularity'
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        scenario:
          # SRA Reads - Yeast (no subsampling, stops after SRA download)
          - id: SRA_Yeast
            name: SRA_Yeast
            rules: aggregate_sra_pe_reads
            configfile: .test/sra_reads/config_yeast/config.yaml
          # SRA Reads - Mouse (subsampled, full workflow)
          - id: SRA_Mouse
            name: SRA_Mouse_Subsampled
            rules: all
            configfile: .test/sra_reads/config_mouse/config.yaml
          # Local Reads - Ensembl (complex config)
          - id: LR_Ens_Comp
            name: LR_Ens_Comp
            rules: all
            configfile: .test/local_reads/ensembl/config_complex/config.yaml
          # Local Reads - Ensembl (GMT test config)
          - id: LR_Ens_GMT
            name: LR_Ens_GMT
            rules: all
            configfile: .test/local_reads/ensembl/config_gmt_test/config.yaml
          # Local Reads - RefSeq (complex config)
          - id: LR_Ref_Comp
            name: LR_Ref_Comp
            rules: all
            configfile: .test/local_reads/refseq/config_complex/config.yaml

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TUFTS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Clone repository on HPC
        id: setup
        if: >-
          github.event_name != 'workflow_dispatch'
          || inputs.scenario == 'all'
          || inputs.scenario == matrix.scenario.id
        run: |
          RUN_DIR="${{ secrets.TUFTS_WORK_DIR }}/${{ github.run_id }}-singularity-${{ matrix.scenario.id }}"
          echo "run_dir=${RUN_DIR}" >> "$GITHUB_OUTPUT"

          ssh ${{ secrets.TUFTS_SSH_USER }}@${{ env.SSH_HOST }} bash <<REMOTE_SCRIPT
            set -euo pipefail
            mkdir -p "${RUN_DIR}"
            cd "${RUN_DIR}"
            git clone --recurse-submodules --depth 1 \
              --branch "${{ github.ref_name }}" \
              https://github.com/${{ github.repository }}.git repo
            cd repo
            rm -rf .Rprofile renv renv.lock
            echo "Checked out \$(git rev-parse --short HEAD)"
          REMOTE_SCRIPT

      - name: Submit SLURM wrapper job
        id: slurm
        if: steps.setup.outcome == 'success'
        run: |
          # Submit a batch job that runs Snakemake on a compute node.
          # Snakemake itself submits individual rules as SLURM sub-jobs
          # via the slurm-dev profile (executor: slurm).
          JOB_ID=$(ssh ${{ secrets.TUFTS_SSH_USER }}@${{ env.SSH_HOST }} bash <<'REMOTE_SCRIPT'
            set -euo pipefail
            RUN_DIR="${{ steps.setup.outputs.run_dir }}/repo"

            # Write the SLURM batch script
            cat > "${RUN_DIR}/ci-wrapper.sh" <<'BATCH_SCRIPT'
          #!/bin/bash -l
          #SBATCH -J tucca-ci-singularity
          #SBATCH --time=${{ env.SBATCH_TIME }}
          #SBATCH -p ${{ env.SBATCH_PARTITION }}
          #SBATCH -N 1
          #SBATCH -n ${{ env.SBATCH_CPUS }}
          #SBATCH --mem=${{ env.SBATCH_MEM }}
          #SBATCH --output=${{ steps.setup.outputs.run_dir }}/repo/ci-wrapper-%j.out
          #SBATCH --error=${{ steps.setup.outputs.run_dir }}/repo/ci-wrapper-%j.err

          set -euo pipefail
          cd "${{ steps.setup.outputs.run_dir }}/repo"

          # Load required modules
          module purge
          module load ${{ env.SNAKEMAKE_MODULE }}
          module load ${{ env.SINGULARITY_MODULE }}
          module load ${{ env.CONDA_MODULE }}

          echo "=== Singularity Test ==="
          echo "Node: $(hostname)"
          echo "Snakemake: $(snakemake --version)"
          echo "Singularity: $(singularity --version)"
          echo "========================"

          # Run Snakemake — it will submit sub-jobs via the SLURM executor
          snakemake ${{ matrix.scenario.rules }} \
            --workflow-profile profiles/slurm-dev \
            --configfile ${{ matrix.scenario.configfile }} \
            --config api_keys='{"ncbi": "${{ secrets.BB_NCBI_API_KEY }}"}' \
            --conda-prefix "${{ secrets.TUFTS_CONDA_PREFIX }}" \
            --singularity-prefix "${{ secrets.TUFTS_SINGULARITY_PREFIX }}"
          BATCH_SCRIPT

            chmod +x "${RUN_DIR}/ci-wrapper.sh"

            # Submit and capture the job ID
            RESULT=$(sbatch "${RUN_DIR}/ci-wrapper.sh")
            echo "${RESULT}" | grep -oP '\d+' | tail -1
          REMOTE_SCRIPT
          )

          echo "job_id=${JOB_ID}" >> "$GITHUB_OUTPUT"
          echo "Submitted SLURM job: ${JOB_ID}"

      - name: Wait for SLURM job to complete
        if: steps.slurm.outcome == 'success'
        run: |
          JOB_ID="${{ steps.slurm.outputs.job_id }}"
          echo "Waiting for SLURM job ${JOB_ID}..."

          # Allow SLURM to register the job before polling
          sleep 30

          while true; do
            # Query job state from login node (sacct is allowed on login nodes)
            STATE=$(ssh ${{ secrets.TUFTS_SSH_USER }}@${{ env.SSH_HOST }} \
              "sacct -j ${JOB_ID} --format=State --noheader --parsable2 | head -1 | tr -d ' '")

            echo "$(date '+%H:%M:%S') Job ${JOB_ID}: ${STATE:-'(not yet registered)'}"

            case "${STATE}" in
              COMPLETED)
                echo "Job completed successfully"
                break
                ;;
              FAILED|CANCELLED|TIMEOUT|OUT_OF_MEMORY|NODE_FAIL|PREEMPTED)
                echo "::error::SLURM job ${JOB_ID} ended with state: ${STATE}"
                # Dump the wrapper job's stderr for debugging
                ssh ${{ secrets.TUFTS_SSH_USER }}@${{ env.SSH_HOST }} \
                  "cat ${{ steps.setup.outputs.run_dir }}/repo/ci-wrapper-${JOB_ID}.err 2>/dev/null" || true
                exit 1
                ;;
              PENDING|RUNNING|CONFIGURING|COMPLETING|REQUEUED|"")
                # Still running or not yet registered, wait before polling again
                sleep 120
                ;;
              *)
                echo "Unknown state: ${STATE}, continuing to wait..."
                sleep 120
                ;;
            esac
          done

      - name: Retrieve logs
        if: always() && steps.setup.outcome == 'success'
        run: |
          mkdir -p hpc-logs
          # Get Snakemake logs
          scp -r "${{ secrets.TUFTS_SSH_USER }}@${{ env.SSH_HOST }}:${{ steps.setup.outputs.run_dir }}/repo/logs/*" \
            hpc-logs/ 2>/dev/null || echo "No Snakemake logs found"
          # Get SLURM wrapper job output
          scp "${{ secrets.TUFTS_SSH_USER }}@${{ env.SSH_HOST }}:${{ steps.setup.outputs.run_dir }}/repo/ci-wrapper-*.out" \
            hpc-logs/ 2>/dev/null || echo "No wrapper stdout found"
          scp "${{ secrets.TUFTS_SSH_USER }}@${{ env.SSH_HOST }}:${{ steps.setup.outputs.run_dir }}/repo/ci-wrapper-*.err" \
            hpc-logs/ 2>/dev/null || echo "No wrapper stderr found"

      - name: Upload logs
        if: always() && steps.setup.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.scenario.name }}_Singularity-hpc-logs
          path: hpc-logs/

      - name: Cleanup
        if: always() && steps.setup.outcome == 'success'
        run: |
          ssh ${{ secrets.TUFTS_SSH_USER }}@${{ env.SSH_HOST }} \
            "rm -rf ${{ steps.setup.outputs.run_dir }}" || true

  HPC_Apptainer:
    name: ${{ matrix.scenario.name }}_Apptainer (HPC)
    runs-on: ubuntu-latest
    needs: [SLURM_Smoke_Test]
    if: >-
      github.event_name != 'workflow_dispatch' || inputs.container == 'both' || inputs.container == 'apptainer'
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        scenario:
          # SRA Reads - Yeast (no subsampling, stops after SRA download)
          - id: SRA_Yeast
            name: SRA_Yeast
            rules: aggregate_sra_pe_reads
            configfile: .test/sra_reads/config_yeast/config.yaml
          # SRA Reads - Mouse (subsampled, full workflow)
          - id: SRA_Mouse
            name: SRA_Mouse_Subsampled
            rules: all
            configfile: .test/sra_reads/config_mouse/config.yaml
          # Local Reads - Ensembl (complex config)
          - id: LR_Ens_Comp
            name: LR_Ens_Comp
            rules: all
            configfile: .test/local_reads/ensembl/config_complex/config.yaml
          # Local Reads - Ensembl (GMT test config)
          - id: LR_Ens_GMT
            name: LR_Ens_GMT
            rules: all
            configfile: .test/local_reads/ensembl/config_gmt_test/config.yaml
          # Local Reads - RefSeq (complex config)
          - id: LR_Ref_Comp
            name: LR_Ref_Comp
            rules: all
            configfile: .test/local_reads/refseq/config_complex/config.yaml

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TUFTS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Clone repository on HPC
        id: setup
        if: >-
          github.event_name != 'workflow_dispatch'
          || inputs.scenario == 'all'
          || inputs.scenario == matrix.scenario.id
        run: |
          RUN_DIR="${{ secrets.TUFTS_WORK_DIR }}/${{ github.run_id }}-apptainer-${{ matrix.scenario.id }}"
          echo "run_dir=${RUN_DIR}" >> "$GITHUB_OUTPUT"

          ssh ${{ secrets.TUFTS_SSH_USER }}@${{ env.SSH_HOST }} bash <<REMOTE_SCRIPT
            set -euo pipefail
            mkdir -p "${RUN_DIR}"
            cd "${RUN_DIR}"
            git clone --recurse-submodules --depth 1 \
              --branch "${{ github.ref_name }}" \
              https://github.com/${{ github.repository }}.git repo
            cd repo
            rm -rf .Rprofile renv renv.lock
            echo "Checked out \$(git rev-parse --short HEAD)"
          REMOTE_SCRIPT

      - name: Submit SLURM wrapper job
        id: slurm
        if: steps.setup.outcome == 'success'
        run: |
          # Submit a batch job that runs Snakemake on a compute node.
          # Snakemake itself submits individual rules as SLURM sub-jobs
          # via the slurm-dev profile (executor: slurm).
          JOB_ID=$(ssh ${{ secrets.TUFTS_SSH_USER }}@${{ env.SSH_HOST }} bash <<'REMOTE_SCRIPT'
            set -euo pipefail
            RUN_DIR="${{ steps.setup.outputs.run_dir }}/repo"

            # Write the SLURM batch script
            cat > "${RUN_DIR}/ci-wrapper.sh" <<'BATCH_SCRIPT'
          #!/bin/bash -l
          #SBATCH -J tucca-ci-apptainer
          #SBATCH --time=${{ env.SBATCH_TIME }}
          #SBATCH -p ${{ env.SBATCH_PARTITION }}
          #SBATCH -N 1
          #SBATCH -n ${{ env.SBATCH_CPUS }}
          #SBATCH --mem=${{ env.SBATCH_MEM }}
          #SBATCH --output=${{ steps.setup.outputs.run_dir }}/repo/ci-wrapper-%j.out
          #SBATCH --error=${{ steps.setup.outputs.run_dir }}/repo/ci-wrapper-%j.err

          set -euo pipefail
          cd "${{ steps.setup.outputs.run_dir }}/repo"

          # Load required modules
          module purge
          module load ${{ env.SNAKEMAKE_MODULE }}
          module load ${{ env.APPTAINER_MODULE }}
          module load ${{ env.CONDA_MODULE }}

          echo "=== Apptainer Test ==="
          echo "Node: $(hostname)"
          echo "Snakemake: $(snakemake --version)"
          echo "Apptainer: $(apptainer --version)"
          echo "======================"

          # Run Snakemake — it will submit sub-jobs via the SLURM executor
          snakemake ${{ matrix.scenario.rules }} \
            --workflow-profile profiles/slurm-dev \
            --configfile ${{ matrix.scenario.configfile }} \
            --config api_keys='{"ncbi": "${{ secrets.BB_NCBI_API_KEY }}"}' \
            --conda-prefix "${{ secrets.TUFTS_CONDA_PREFIX }}" \
            --singularity-prefix "${{ secrets.TUFTS_SINGULARITY_PREFIX }}"
          BATCH_SCRIPT

            chmod +x "${RUN_DIR}/ci-wrapper.sh"

            # Submit and capture the job ID
            RESULT=$(sbatch "${RUN_DIR}/ci-wrapper.sh")
            echo "${RESULT}" | grep -oP '\d+' | tail -1
          REMOTE_SCRIPT
          )

          echo "job_id=${JOB_ID}" >> "$GITHUB_OUTPUT"
          echo "Submitted SLURM job: ${JOB_ID}"

      - name: Wait for SLURM job to complete
        if: steps.slurm.outcome == 'success'
        run: |
          JOB_ID="${{ steps.slurm.outputs.job_id }}"
          echo "Waiting for SLURM job ${JOB_ID}..."

          # Allow SLURM to register the job before polling
          sleep 30

          while true; do
            # Query job state from login node (sacct is allowed on login nodes)
            STATE=$(ssh ${{ secrets.TUFTS_SSH_USER }}@${{ env.SSH_HOST }} \
              "sacct -j ${JOB_ID} --format=State --noheader --parsable2 | head -1 | tr -d ' '")

            echo "$(date '+%H:%M:%S') Job ${JOB_ID}: ${STATE:-'(not yet registered)'}"

            case "${STATE}" in
              COMPLETED)
                echo "Job completed successfully"
                break
                ;;
              FAILED|CANCELLED|TIMEOUT|OUT_OF_MEMORY|NODE_FAIL|PREEMPTED)
                echo "::error::SLURM job ${JOB_ID} ended with state: ${STATE}"
                # Dump the wrapper job's stderr for debugging
                ssh ${{ secrets.TUFTS_SSH_USER }}@${{ env.SSH_HOST }} \
                  "cat ${{ steps.setup.outputs.run_dir }}/repo/ci-wrapper-${JOB_ID}.err 2>/dev/null" || true
                exit 1
                ;;
              PENDING|RUNNING|CONFIGURING|COMPLETING|REQUEUED|"")
                # Still running or not yet registered, wait before polling again
                sleep 120
                ;;
              *)
                echo "Unknown state: ${STATE}, continuing to wait..."
                sleep 120
                ;;
            esac
          done

      - name: Retrieve logs
        if: always() && steps.setup.outcome == 'success'
        run: |
          mkdir -p hpc-logs
          # Get Snakemake logs
          scp -r "${{ secrets.TUFTS_SSH_USER }}@${{ env.SSH_HOST }}:${{ steps.setup.outputs.run_dir }}/repo/logs/*" \
            hpc-logs/ 2>/dev/null || echo "No Snakemake logs found"
          # Get SLURM wrapper job output
          scp "${{ secrets.TUFTS_SSH_USER }}@${{ env.SSH_HOST }}:${{ steps.setup.outputs.run_dir }}/repo/ci-wrapper-*.out" \
            hpc-logs/ 2>/dev/null || echo "No wrapper stdout found"
          scp "${{ secrets.TUFTS_SSH_USER }}@${{ env.SSH_HOST }}:${{ steps.setup.outputs.run_dir }}/repo/ci-wrapper-*.err" \
            hpc-logs/ 2>/dev/null || echo "No wrapper stderr found"

      - name: Upload logs
        if: always() && steps.setup.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.scenario.name }}_Apptainer-hpc-logs
          path: hpc-logs/

      - name: Cleanup
        if: always() && steps.setup.outcome == 'success'
        run: |
          ssh ${{ secrets.TUFTS_SSH_USER }}@${{ env.SSH_HOST }} \
            "rm -rf ${{ steps.setup.outputs.run_dir }}" || true
